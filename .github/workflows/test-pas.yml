name: Pascal CIEDE2000 Testing

# During summer 2025, this workflow was tested on multiple occasions and completed successfully in 66 seconds.

on:
  schedule:
    - cron: '3 3 4,18 * *'
  workflow_dispatch:

env:
  description: "Automated Testing — Michel Leonard implements the CIE2000 color difference formula in Pascal"
  input_file: "test-cases.csv contains lines like 84,76.5,12,78.7,76,-49 representing two L*a*b* colors"
  process:  "Print the line with its Delta E like 84,76.5,12,78.7,76,-49,21.652358752223551595971162075928 for each line"
  related_url: "https://github.com/michel-leonard/ciede2000-color-matching/tree/main/tests/pas"
  n_csv_lines: 10000000

jobs:
  test-implementation-de00-pascal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 With each step we’ll start at the root of the reopsitory
        uses: actions/checkout@v5

      - name: 👉 Disable the user manual database, which is not needed in this CI/CD workflow
        run: sudo mv /usr/bin/mandb /usr/bin/mandb.deactivated && sudo cp -p /bin/true /usr/bin/mandb

      - name: 👉 Set up a less crowded server for the APT package manager (step disabled, but useful when an installation is slow)
        run: true || grep -Flr '.ubuntu.com' /etc/apt | xargs sudo sed -i 's|[^/]\+ubuntu.com|mirrors.maine.edu|g'

      - name: 📦 Set up Free Pascal and GCC
        run: |
          command -v fp-compiler > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes fp-compiler ; }
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }

      - name: ⚙️ Compile Pascal test file
        run: fpc -iV && fpc -O2 -oCIEDE2000Test tests/pas/ciede-2000-driver.pas

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: gcc --version && gcc -std=c99 -Wall -pedantic -O2 -g tests/c/ciede-2000-driver.c -o ciede-2000-driver -lm

      - name: 📑 Display help for the authoritative test software
        run: ./ciede-2000-driver --help

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede-2000-driver --rand-seed $(date +'%Y%V') --generate $n_csv_lines --output-file test-cases.csv

      - name: 🚀 Run test cases in Pascal and stream to verifier
        run: tests/pas/CIEDE2000Test test-cases.csv | ./ciede-2000-driver -o summary.txt

      - name: 🔍 Display verification output
        run: cat summary.txt

      - name: 🏁 Conclusion
        run: |
          if grep -q "Errors : 0" summary.txt && grep -q "Successes : $n_csv_lines" summary.txt; then
            echo "✔️ Verification successful: all $n_csv_lines color differences were correctly calculated."
          else
            echo "❌ Verification failed. See above for details."
            exit 1
          fi
