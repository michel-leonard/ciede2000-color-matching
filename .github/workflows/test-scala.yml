name: Scala CIEDE2000 Testing

# When this workflow was tested, its execution produced a success in 83 seconds.

on:
  schedule:
    - cron: '29 11 9,23 * *'
  workflow_dispatch:

env:
  description: "Automated Testing — Michel Leonard implements the CIE2000 color difference formula in Scala"
  input_file: "test-cases.csv contains lines like 65.9,-8,84.4,68,6,67 representing two L*a*b* colors"
  process:  "Print the line with its Delta E like 65.9,-8,84.4,68,6,67,9.197982994370911191965716943054 for each line"
  related_url: "https://github.com/michel-leonard/ciede2000-color-matching/tree/main/tests/scala"
  n_csv_lines: 10000000

jobs:
  test-implementation-de00-scala:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 Check out repository
        uses: actions/checkout@v4

      - name: 📦 Set up Scala and GCC
        run: |
          command -v scalac > /dev/null || { sudo apt-get update && sudo apt-get install -y scala ; }
          command -v gcc > /dev/null || { sudo apt-get update && sudo apt-get install -y gcc ; }

      - name: ⚙️ Compile CIEDE2000 tester in Scala
        run: |
          cp -p tests/scala/ciede-2000-driver.scala Main.scala
          scala -version && scalac -version && scalac Main.scala

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: gcc --version && gcc -std=c99 -Wall -pedantic -O2 -g tests/c/ciede-2000-driver.c -o ciede-2000-driver -lm

      - name: 📑 Display help for the authoritative test software
        run: ./ciede-2000-driver --help

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede-2000-driver --rand-seed $(date +'%Y%V') --generate $n_csv_lines --output-file test-cases.csv

      - name: 🚀 Run test cases in Scala and stream to verifier
        run: scala Main test-cases.csv | ./ciede-2000-driver -o summary.txt

      - name: 🔍 Display verification output
        run: cat summary.txt

      - name: 🏁 Conclusion
        run: |
          if grep -q "Errors : 0" summary.txt && grep -q "Successes : $n_csv_lines" summary.txt; then
            echo "✔️ Verification successful: all $n_csv_lines color differences were correctly calculated."
          else
            echo "❌ Verification failed. See above for details."
            exit 1
          fi
