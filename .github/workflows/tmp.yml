name: Temp

on:
  workflow_dispatch:

jobs:
  test-cie-2000-temporary-1:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 Check out repository
        uses: actions/checkout@v4

      - name: 📦 Exec
        run: |
          rustc --version && cargo --version
          cargo new demo
          echo '' | base64 --decode > demo/src/main.rs
          echo 'rand = "0.8"' >> demo/Cargo.toml
          echo 'num-traits = "0.2"' >> demo/Cargo.toml
          cd demo
          cargo build
          cargo run --release -- 100000000
