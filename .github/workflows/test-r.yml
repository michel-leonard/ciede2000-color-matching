name: R CIEDE2000 Testing

# When this workflow was tested, its execution produced a success in 220 seconds.

on:
  schedule:
    - cron: '5 5 5,19 * *'
  workflow_dispatch:

env:
  description: "Automated Testing — Michel Leonard implements the CIE2000 color difference formula in R"
  input_file: "test-cases.csv contains lines like 51,4.3,90,48.3,-20,116 representing two L*a*b* colors"
  process:  "Print the line with its Delta E like 51,4.3,90,48.3,-20,116,12.497294297213971744079236378547 for each line"
  related_url: "https://github.com/michel-leonard/ciede2000-color-matching/tree/main/tests/r"
  n_csv_lines: 10000000

jobs:
  test-implementation-de00-r:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📂 Check out repository
        uses: actions/checkout@v4

      - name: 📦 Set up R, Rscript and gcc
        run: |
          command -v Rscript > /dev/null || {
            command -v dirmngr > /dev/null && command -v apt-add-repository > /dev/null ||
            { sudo apt-get update && sudo apt-get install -y --no-install-recommends software-properties-common dirmngr ; }
            . /etc/os-release && wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc |
            gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/cran.gpg >/dev/null
            echo "deb [signed-by=/etc/apt/trusted.gpg.d/cran.gpg] \
            https://cloud.r-project.org/bin/linux/ubuntu ${VERSION_CODENAME}-cran40/" |
            sudo tee /etc/apt/sources.list.d/cran.list
            sudo apt-get update && sudo apt-get install -y r-base
          }
          command -v gcc > /dev/null || { sudo apt-get update && sudo apt-get install -y gcc ; }

      - name: 🔧 Install dependencies
        run: |
          Rscript -e 'cat("R version:", R.version.string, "\n")'
          # Rscript -e "install.packages('renv', repos='https://cran.r-project.org')"
          # Rscript -e "if (file.exists('renv.lock')) renv::restore()"

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: gcc --version && gcc -std=c99 -Wall -pedantic -O2 -g tests/c/ciede-2000-driver.c -o ciede-2000-driver -lm

      - name: 📑 Display help for the authoritative test software
        run: ./ciede-2000-driver --help

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede-2000-driver --rand-seed $(date +'%Y%V') --generate $n_csv_lines --output-file test-cases.csv

      - name: 🚀 Run test cases in R and stream to verifier
        run: Rscript tests/r/ciede-2000-driver.r test-cases.csv | ./ciede-2000-driver -o summary.txt

      - name: 🔍 Display verification output
        run: cat summary.txt

      - name: 🏁 Conclusion
        run: |
          if grep -q "Errors : 0" summary.txt && grep -q "Successes : $n_csv_lines" summary.txt; then
            echo "✔️ Verification successful: all $n_csv_lines color differences were correctly calculated."
          else
            echo "❌ Verification failed. See above for details."
            exit 1
          fi
